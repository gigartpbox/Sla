<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мои поступки</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,'SF Pro Display','Segoe UI',Roboto,system-ui,sans-serif}
    body{background:#0a0f1a;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:12px;color:#eef5ff}
    .app{max-width:430px;width:100%;background:linear-gradient(165deg,#141e2b,#0b111c);border-radius:32px;padding:20px 18px 28px;box-shadow:0 20px 60px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.04)}
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .top-bar .back-btn{background:rgba(255,255,255,.05);border:none;color:#8ab4e0;font-size:1.4rem;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.04)}
    .top-bar .back-btn:active{transform:scale(.92);background:rgba(255,255,255,.1)}
    .top-bar .title{font-size:1.3rem;font-weight:600;letter-spacing:.3px;background:linear-gradient(135deg,#e0edff,#8ab4e0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    .total-score-block{text-align:center;padding:12px 0 16px 0;margin-bottom:6px}
    .total-score-block .label{font-size:.7rem;color:#4a6a86;text-transform:uppercase;letter-spacing:1px}
    .total-score-block .number{font-size:4.2rem;font-weight:800;color:#6fc3ff;line-height:1.1;transition:.3s;text-shadow:0 0 40px rgba(111,195,255,.15)}
    .total-score-block .number.negative{color:#ff7a7a;text-shadow:0 0 40px rgba(255,122,122,.15)}
    .score-pop{animation:popScore .3s cubic-bezier(.34,1.56,.64,1)}
    @keyframes popScore{0%{transform:scale(1)}50%{transform:scale(1.2);color:#8fcbff}100%{transform:scale(1)}}
    .score-pop.negative-pop{animation:popScoreNeg .3s cubic-bezier(.34,1.56,.64,1)}
    @keyframes popScoreNeg{0%{transform:scale(1)}50%{transform:scale(1.2);color:#ff7a7a}100%{transform:scale(1)}}

    .input-row{display:flex;gap:8px;margin:6px 0 10px;flex-wrap:wrap}
    .input-row input{flex:1;min-width:120px;padding:14px 18px;border-radius:30px;border:none;background:rgba(255,255,255,.05);color:#eef5ff;font-size:.95rem;outline:1px solid rgba(255,255,255,.04);transition:.2s;backdrop-filter:blur(8px)}
    .input-row input::placeholder{color:#5a7a96}
    .input-row input:focus{outline:1px solid #3a7a9e;background:rgba(255,255,255,.08)}
    .input-row .btn-group{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

    .btn{border:none;border-radius:30px;padding:12px 18px;font-weight:600;font-size:.95rem;cursor:pointer;color:#fff;transition:.15s;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.04);min-width:60px;display:flex;align-items:center;justify-content:center}
    .btn:active{transform:scale(.94)}
    .btn-plus{background:linear-gradient(145deg,#1f7a4a,#16633b);box-shadow:0 4px 16px rgba(31,122,74,.3)}
    .btn-plus:active{box-shadow:0 2px 8px rgba(31,122,74,.2)}
    .btn-minus{background:linear-gradient(145deg,#7a3a3a,#5f2a2a);box-shadow:0 4px 16px rgba(122,58,58,.3)}
    .btn-minus:active{box-shadow:0 2px 8px rgba(122,58,58,.2)}

    /* ===== МАЛЕНЬКИЕ КНОПКИ ===== */
    .btn-sm{font-size:.7rem;padding:8px 12px;min-width:44px;border-radius:40px}
    .btn-sm-plus{background:linear-gradient(145deg,#2a6a4a,#1a4a32);box-shadow:0 3px 10px rgba(42,106,74,.25)}
    .btn-sm-plus:active{box-shadow:0 1px 4px rgba(42,106,74,.15)}
    .btn-sm-minus{background:linear-gradient(145deg,#7a3a3a,#5a2a2a);box-shadow:0 3px 10px rgba(122,58,58,.25)}
    .btn-sm-minus:active{box-shadow:0 1px 4px rgba(122,58,58,.15)}

    .achievements{display:flex;gap:8px;flex-wrap:wrap;background:rgba(255,255,255,.02);border-radius:24px;padding:10px 14px;margin-bottom:16px;border:1px solid rgba(255,255,255,.03)}
    .ach-item{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 6px;border-radius:40px;background:rgba(255,255,255,.02);transition:.3s;flex:1 1 auto;min-width:80px;border:1px solid transparent}
    .ach-item.unlocked{background:rgba(255,215,0,.06);border-color:rgba(255,215,0,.1)}
    .ach-icon{font-size:1.4rem;filter:grayscale(1) brightness(.3);transition:.4s}
    .ach-item.unlocked .ach-icon{filter:grayscale(0) brightness(1);animation:glowIcon 2s infinite alternate}
    @keyframes glowIcon{0%{filter:grayscale(0) brightness(1) drop-shadow(0 0 2px rgba(255,215,0,.1))}100%{filter:grayscale(0) brightness(1.2) drop-shadow(0 0 12px rgba(255,215,0,.3))}}
    .ach-info{font-size:.7rem;color:#7a94b0;display:flex;align-items:center;gap:3px}
    .ach-item.unlocked .ach-info{color:#c0d8f0}
    .ach-name{font-weight:500}
    .ach-lock{font-size:.6rem;opacity:.3}
    .ach-item.unlocked .ach-lock{opacity:1;color:#f5c542}
    .ach-badge{background:rgba(255,255,255,.04);padding:0 8px;border-radius:12px;font-size:.55rem;color:#5a7a96}
    .ach-item.unlocked .ach-badge{background:rgba(245,197,66,.15);color:#f5c542}

    .day-nav{display:flex;gap:6px;overflow-x:auto;padding:4px 0 12px;flex-wrap:nowrap;scrollbar-width:none;-webkit-overflow-scrolling:touch}
    .day-nav::-webkit-scrollbar{display:none}
    .day-btn{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);color:#7a94b0;padding:6px 16px;border-radius:30px;font-weight:500;font-size:.8rem;cursor:pointer;white-space:nowrap;transition:.25s;backdrop-filter:blur(4px);flex-shrink:0}
    .day-btn:active{transform:scale(.94)}
    .day-btn.active{background:linear-gradient(145deg,#2a5f7a,#1d4560);color:#fff;border-color:rgba(255,255,255,.08);box-shadow:0 4px 20px rgba(42,95,122,.3)}

    .stats-grid{display:flex;flex-wrap:wrap;gap:4px 12px;background:rgba(255,255,255,.02);border-radius:24px;padding:12px 16px;margin:6px 0 10px;border:1px solid rgba(255,255,255,.03)}
    .stat-item{flex:1;min-width:60px}
    .stat-label{font-size:.55rem;color:#4a6a86;text-transform:uppercase;letter-spacing:.6px}
    .stat-value{font-size:1.1rem;font-weight:700;transition:.2s}
    .stat-value.good{color:#5fcf8a}
    .stat-value.bad{color:#ff6b6b}
    .stat-value.score{color:#6fc3ff}
    .stat-value .sub{font-size:.65rem;font-weight:400;opacity:.5;margin-left:2px}

    .section-title{font-weight:500;color:#5a7a96;font-size:.8rem;margin:12px 0 6px;display:flex;align-items:center;gap:6px;letter-spacing:.3px}
    .section-title small{font-weight:400;font-size:.6rem;color:#3a5a76}

    .history-list{max-height:160px;overflow-y:auto;padding-right:4px;scrollbar-width:thin;scrollbar-color:#1f2f40 transparent}
    .history-list::-webkit-scrollbar{width:3px}
    .history-list::-webkit-scrollbar-thumb{background:#1f2f40;border-radius:10px}
    .history-item{display:flex;justify-content:space-between;padding:8px 14px;background:rgba(255,255,255,.02);border-radius:20px;margin-bottom:4px;border-left:3px solid #1f2f40;font-size:.85rem;animation:fadeSlide .25s ease;backdrop-filter:blur(4px)}
    @keyframes fadeSlide{0%{opacity:0;transform:translateX(-8px)}100%{opacity:1;transform:translateX(0)}}
    .history-item .h-text{flex:1;word-break:break-word;padding-right:8px;color:#c0d8f0}
    .history-item .h-delta{font-weight:700;padding:0 10px;border-radius:20px;background:rgba(0,0,0,.2);white-space:nowrap;font-size:.8rem}
    .h-delta.positive{color:#5fcf8a}
    .h-delta.negative{color:#ff6b6b}
    .h-day-label{font-size:.55rem;color:#4a6a86;margin-right:6px;font-weight:500}
    .empty-history{color:#3a5a76;text-align:center;padding:14px 0;font-size:.8rem}

    .divider{border:none;border-top:1px solid rgba(255,255,255,.03);margin:12px 0}

    .bottom-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-top:14px}
    .action-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .btn-day{background:linear-gradient(145deg,#1f2f40,#15222f);border:1px solid rgba(255,255,255,.04);color:#8ab4e0;padding:8px 18px;border-radius:30px;font-size:.8rem;font-weight:500;cursor:pointer;transition:.2s;backdrop-filter:blur(4px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
    .btn-day:active{transform:scale(.94)}
    .btn-delete{background:linear-gradient(145deg,#5a2a2a,#3f1a1a);border:1px solid rgba(255,255,255,.04);color:#ff8a8a;padding:8px 14px;border-radius:30px;font-size:.75rem;font-weight:500;cursor:pointer;transition:.2s;backdrop-filter:blur(4px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
    .btn-delete:active{transform:scale(.94)}
    .btn-reset{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);color:#5a7a96;padding:6px 16px;border-radius:30px;font-size:.7rem;cursor:pointer;transition:.2s}
    .btn-reset:active{transform:scale(.94);background:rgba(255,255,255,.04)}
    .save-hint{color:#2a4a66;font-size:.6rem;opacity:.5}

    @media(max-width:400px){
      .app{padding:16px 12px 20px;border-radius:24px}
      .top-bar .title{font-size:1.1rem}
      .total-score-block .number{font-size:3.4rem}
      .btn{padding:10px 14px;font-size:.85rem;min-width:50px}
      .btn-sm{font-size:.6rem;padding:6px 8px;min-width:34px}
      .input-row input{padding:12px 14px;font-size:.85rem}
      .stat-value{font-size:.95rem}
      .ach-item{min-width:60px}
      .ach-icon{font-size:1.2rem}
      .history-item{font-size:.75rem;padding:6px 10px}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <button class="back-btn" id="backBtn">←</button>
    <span class="title">Поступки</span>
    <div style="width:44px"></div>
  </div>

  <div class="total-score-block">
    <div class="label">Общий счёт</div>
    <div class="number" id="totalScore">0</div>
  </div>

  <div class="input-row">
    <input type="text" id="actionInput" placeholder="Что сделал?">
    <div class="btn-group">
      <!-- Основные -->
      <button class="btn btn-plus" id="addPlus">+1</button>
      <button class="btn btn-minus" id="addMinus">–2</button>
      <!-- Зелёные маленькие -->
      <button class="btn btn-sm btn-sm-plus" id="addSmall1">+0.2</button>
      <button class="btn btn-sm btn-sm-plus" id="addSmall2">+0.5</button>
      <!-- Красные маленькие -->
      <button class="btn btn-sm btn-sm-minus" id="addSmallMinus1">–1</button>
      <button class="btn btn-sm btn-sm-minus" id="addSmallMinus5">–5</button>
    </div>
  </div>

  <div class="achievements">
    <div class="ach-item" data-threshold="20"><span class="ach-icon">🎮</span><div class="ach-info"><span class="ach-name">Приставка</span><span class="ach-badge">20</span><span class="ach-lock">🔒</span></div></div>
    <div class="ach-item" data-threshold="50"><span class="ach-icon">💻</span><div class="ach-info"><span class="ach-name">Компьютер</span><span class="ach-badge">50</span><span class="ach-lock">🔒</span></div></div>
    <div class="ach-item" data-threshold="100"><span class="ach-icon">📱</span><div class="ach-info"><span class="ach-name">Телефон</span><span class="ach-badge">100</span><span class="ach-lock">🔒</span></div></div>
  </div>

  <div class="day-nav" id="dayNav"></div>

  <div class="stats-grid">
    <div class="stat-item"><div class="stat-label">Баллы за день</div><div class="stat-value score" id="dayScore">0</div></div>
    <div class="stat-item"><div class="stat-label">Хороших</div><div class="stat-value good" id="dayGood"><span id="dayGoodCount">0</span><span class="sub">(<span id="dayGoodPercent">0</span>%)</span></div></div>
    <div class="stat-item"><div class="stat-label">Плохих</div><div class="stat-value bad" id="dayBad"><span id="dayBadCount">0</span><span class="sub">(<span id="dayBadPercent">0</span>%)</span></div></div>
  </div>

  <div class="section-title">📜 История за день</div>
  <div class="history-list" id="historyList"><div class="empty-history">Нет записей</div></div>

  <hr class="divider">

  <div class="section-title">📊 Общая статистика <small>за все дни</small></div>
  <div class="stats-grid" style="background:rgba(255,255,255,.015);">
    <div class="stat-item"><div class="stat-label">Хороших</div><div class="stat-value good" id="totalGood"><span id="totalGoodCount">0</span><span class="sub">(<span id="totalGoodPercent">0</span>%)</span></div></div>
    <div class="stat-item"><div class="stat-label">Плохих</div><div class="stat-value bad" id="totalBad"><span id="totalBadCount">0</span><span class="sub">(<span id="totalBadPercent">0</span>%)</span></div></div>
  </div>

  <div class="section-title" style="margin-top:10px;">📜 Все действия <small>за все дни</small></div>
  <div class="history-list" id="allHistoryList" style="max-height:140px;"><div class="empty-history">Нет записей</div></div>

  <div class="bottom-row">
    <div class="action-row">
      <button class="btn-day" id="newDayBtn">📅 Новый день</button>
      <button class="btn-delete" id="deleteDayBtn">🗑 Удалить день</button>
      <button class="btn-reset" id="resetBtn">Сбросить</button>
    </div>
    <span class="save-hint">сохраняется</span>
  </div>
</div>

<script>
(function(){
  const S='daytracker_data';
  const T=document.getElementById('totalScore');
  const I=document.getElementById('actionInput');
  const P=document.getElementById('addPlus');
  const M=document.getElementById('addMinus');
  const S1=document.getElementById('addSmall1');
  const S2=document.getElementById('addSmall2');
  const SM1=document.getElementById('addSmallMinus1');
  const SM5=document.getElementById('addSmallMinus5');
  const DN=document.getElementById('dayNav');
  const DS=document.getElementById('dayScore');
  const DGC=document.getElementById('dayGoodCount');
  const DGP=document.getElementById('dayGoodPercent');
  const DBC=document.getElementById('dayBadCount');
  const DBP=document.getElementById('dayBadPercent');
  const HL=document.getElementById('historyList');
  const TGC=document.getElementById('totalGoodCount');
  const TGP=document.getElementById('totalGoodPercent');
  const TBC=document.getElementById('totalBadCount');
  const TBP=document.getElementById('totalBadPercent');
  const AHL=document.getElementById('allHistoryList');
  const ND=document.getElementById('newDayBtn');
  const DD=document.getElementById('deleteDayBtn');
  const R=document.getElementById('resetBtn');
  const B=document.getElementById('backBtn');
  const AI=document.querySelectorAll('.ach-item');

  let st={totalScore:0,currentDay:1,days:{1:{actions:[],score:0,good:0,bad:0}}};

  function load(){try{const d=JSON.parse(localStorage.getItem(S));if(d&&typeof d.totalScore=='number'&&typeof d.currentDay=='number'&&d.days)return d}catch(e){}return null}
  function save(){localStorage.setItem(S,JSON.stringify(st))}
  function getDay(n){if(!st.days[n])st.days[n]={actions:[],score:0,good:0,bad:0};return st.days[n]}
  function pct(g,b){const t=g+b;return t===0?{good:0,bad:0}:{good:Math.round(g/t*100),bad:Math.round(b/t*100)}}
  function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

  function render(animFlag=false){
    const prev=st.totalScore;
    T.textContent=Number.isInteger(st.totalScore)?st.totalScore:st.totalScore.toFixed(1);
    T.classList.toggle('negative',st.totalScore<0);
    if(animFlag){
      T.classList.remove('score-pop','negative-pop');
      void T.offsetWidth;
      if(st.totalScore>prev)T.classList.add('score-pop');
      else if(st.totalScore<prev)T.classList.add('negative-pop');
    }

    [20,50,100].forEach((th,i)=>{const el=AI[i],un=st.totalScore>=th;const l=el.querySelector('.ach-lock');if(l)l.textContent=un?'🔓':'🔒';el.classList.toggle('unlocked',un)});

    const days=Object.keys(st.days).map(Number).sort((a,b)=>a-b);
    DN.innerHTML='';
    days.forEach(d=>{const b=document.createElement('button');b.className='day-btn'+(d===st.currentDay?' active':'');b.textContent='День '+d;b.dataset.day=d;b.addEventListener('click',()=>{st.currentDay=d;render(false)});DN.appendChild(b)});
    const act=DN.querySelector('.day-btn.active');if(act)act.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});

    const d=getDay(st.currentDay);
    DS.textContent=Number.isInteger(d.score)?d.score:d.score.toFixed(1);
    DGC.textContent=d.good;DBC.textContent=d.bad;const p=pct(d.good,d.bad);DGP.textContent=p.good;DBP.textContent=p.bad;

    HL.innerHTML='';if(d.actions.length===0){HL.innerHTML='<div class="empty-history">Нет записей</div>'}else{[...d.actions].reverse().forEach(a=>{const div=document.createElement('div');div.className='history-item';const cls=a.delta>0?'positive':'negative';const s=a.delta>0?'+':'';const val=Number.isInteger(a.delta)?a.delta:a.delta.toFixed(1);div.innerHTML='<span class="h-text">'+esc(a.text)+'</span><span class="h-delta '+cls+'">'+s+val+'</span>';HL.appendChild(div)})}

    let tg=0,tb=0;for(const k in st.days){tg+=st.days[k].good;tb+=st.days[k].bad}
    TGC.textContent=tg;TBC.textContent=tb;const tp=pct(tg,tb);TGP.textContent=tp.good;TBP.textContent=tp.bad;

    const all=[];for(const k in st.days){const n=parseInt(k);st.days[n].actions.forEach(a=>all.push({...a,day:n}))}
    AHL.innerHTML='';if(all.length===0){AHL.innerHTML='<div class="empty-history">Нет записей</div>'}else{[...all].reverse().forEach(a=>{const div=document.createElement('div');div.className='history-item';const cls=a.delta>0?'positive':'negative';const s=a.delta>0?'+':'';const val=Number.isInteger(a.delta)?a.delta:a.delta.toFixed(1);div.innerHTML='<span class="h-text"><span class="h-day-label">День '+a.day+'</span>'+esc(a.text)+'</span><span class="h-delta '+cls+'">'+s+val+'</span>';AHL.appendChild(div)})}

    const dayKeys=Object.keys(st.days);
    DD.style.display=dayKeys.length<=1?'none':'inline-block';
    save()
  }

  function add(delta){
    const t=I.value.trim();
    if(!t){alert('Напишите действие!');return}
    const d=getDay(st.currentDay);
    d.actions.push({text:t,delta,time:new Date().toLocaleString()});
    d.score=parseFloat((d.score+delta).toFixed(2));
    if(delta>0)d.good+=1;
    else d.bad+=1;
    st.totalScore=parseFloat((st.totalScore+delta).toFixed(2));
    I.value='';
    render(true);
    I.focus();
  }

  function newDay(){const days=Object.keys(st.days).map(Number);const next=days.length>0?Math.max(...days)+1:1;st.days[next]={actions:[],score:0,good:0,bad:0};st.currentDay=next;render(false);setTimeout(()=>{const a=DN.querySelector('.day-btn.active');if(a)a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'})},50)}

  function deleteDay(){
    const days=Object.keys(st.days).map(Number).sort((a,b)=>a-b);
    if(days.length<=1){alert('Нельзя удалить единственный день');return}
    const dayToDelete=st.currentDay;
    if(!confirm('Удалить День '+dayToDelete+' и всю его статистику?'))return;
    delete st.days[dayToDelete];
    const remaining=Object.keys(st.days).map(Number).sort((a,b)=>a-b);
    let newDay=remaining[remaining.length-1];
    for(let i=remaining.length-1;i>=0;i--){
      if(remaining[i]<dayToDelete){newDay=remaining[i];break}
    }
    let total=0;
    for(const k in st.days){total+=st.days[k].score}
    st.totalScore=parseFloat(total.toFixed(2));
    st.currentDay=newDay;
    render(false);
  }

  function reset(){if(!confirm('Сбросить всё?'))return;st={totalScore:0,currentDay:1,days:{1:{actions:[],score:0,good:0,bad:0}}};render(false)}
  function back(){window.history.back()}

  function init(){const saved=load();if(saved){st=saved;if(!st.days[st.currentDay])st.days[st.currentDay]={actions:[],score:0,good:0,bad:0}}else{st={totalScore:0,currentDay:1,days:{1:{actions:[],score:0,good:0,bad:0}}}}render(false);P.addEventListener('click',()=>add(1));M.addEventListener('click',()=>add(-2));S1.addEventListener('click',()=>add(0.2));S2.addEventListener('click',()=>add(0.5));SM1.addEventListener('click',()=>add(-1));SM5.addEventListener('click',()=>add(-5));I.addEventListener('keydown',e=>{if(e.key==='Enter')add(1)});ND.addEventListener('click'
